<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Address Book Entry</title>
  <link rel="stylesheet" href="/claude/shared.css">
</head>
<body>

  <div id="authContainer"></div>

  <h2>Edit Address Book Entry</h2>

  <div id="status" class="status"></div>

  <form id="editForm" style="display:none;">

    <fieldset>
      <legend>Name</legend>
      <div class="form-grid">
        <label for="MailingName">Mailing Name</label>
        <input type="text" id="MailingName">

        <label for="FirstName">First Name</label>
        <input type="text" id="FirstName">

        <label for="LastName">Last Name</label>
        <input type="text" id="LastName">
      </div>
    </fieldset>

    <fieldset>
      <legend>Address</legend>
      <div class="form-grid">
        <label for="Street">Street</label>
        <input type="text" id="Street">

        <label for="Apartment">Apartment</label>
        <input type="text" id="Apartment">

        <label for="City">City</label>
        <input type="text" id="City">

        <label for="State">State</label>
        <input type="text" id="State">

        <label for="ZipCode">Zip Code</label>
        <input type="text" id="ZipCode">
      </div>
    </fieldset>

    <fieldset>
      <legend>Contact &amp; Notes</legend>
      <div class="form-grid">
        <label for="PhoneNumber">Phone Number</label>
        <input type="tel" id="PhoneNumber">

        <label for="OtherPeople">Other People</label>
        <input type="text" id="OtherPeople">

        <label for="HolidayCard">Holiday Card</label>
        <select id="HolidayCard">
          <option value="">&mdash; none &mdash;</option>
          <option value="Yes">Yes</option>
        </select>
      </div>
    </fieldset>

    <button type="button" id="saveBtn">Save Changes</button>

    <div class="danger-zone">
      <h3>Danger Zone</h3>
      <p>Deleting an entry cannot be undone.</p>
      <button type="button" id="deleteBtn" class="btn-danger">Delete Entry</button>
    </div>

  </form>

  <div id="backHome" style="margin-top: 16px;"></div>

  <script>
    let currentEntry = null;

    async function checkAuth() {
      const authDiv = document.getElementById('authContainer');

      try {
        const res = await fetch('/.auth/me');
        const data = await res.json();
        const user = data?.clientPrincipal;

        if (!user) {
          authDiv.innerHTML = `
            <div class="auth-bar">
              <span>You must sign in to edit address book entries.</span>
              <button id="signInBtn">Sign in with Microsoft</button>
            </div>`;
          document.getElementById('signInBtn').onclick = () => {
            window.location.href = '/.auth/login/aad?post_login_redirect_uri=' +
              encodeURIComponent(window.location.pathname + window.location.search);
          };
          return false;
        }

        authDiv.innerHTML = `
          <div class="auth-bar">
            <span>Signed in as <strong>${user.userDetails}</strong></span>
            <button id="signOutBtn">Sign out</button>
          </div>`;
        document.getElementById('signOutBtn').onclick = () => {
          window.location.href = '/.auth/logout?post_logout_redirect_uri=' +
            encodeURIComponent(window.location.pathname + window.location.search);
        };

        return true;

      } catch (err) {
        authDiv.textContent = 'Error checking authentication.';
        console.error(err);
        return false;
      }
    }

    function showStatus(msg, isError) {
      const s = document.getElementById('status');
      s.textContent = msg;
      s.className = 'status ' + (isError ? 'error' : 'success');
    }

    async function loadEntry() {
      const params = new URLSearchParams(window.location.search);
      const id = params.get('id');

      if (!id) {
        showStatus('Missing ?id= parameter.', true);
        return;
      }

      const res = await fetch(`/api/AddressBookReadOne?id=${encodeURIComponent(id)}`);
      if (!res.ok) {
        showStatus('Failed to load entry.', true);
        return;
      }

      currentEntry = await res.json();

      for (const key of ['MailingName', 'FirstName', 'LastName', 'Street', 'Apartment',
                         'City', 'State', 'ZipCode', 'PhoneNumber', 'OtherPeople']) {
        document.getElementById(key).value = currentEntry[key] ?? '';
      }

      // Map the stored HolidayCard value to the select; unknown values fall back to blank
      const hcSelect = document.getElementById('HolidayCard');
      const storedVal = currentEntry.HolidayCard || '';
      const hasOption = Array.from(hcSelect.options).some(o => o.value === storedVal);
      hcSelect.value = hasOption ? storedVal : '';

      document.getElementById('backHome').innerHTML =
        `<a href="/claude/addressbook/index.html?id=${encodeURIComponent(id)}">&larr; Back to Address Book</a>`;
    }

    async function saveChanges() {
      const btn = document.getElementById('saveBtn');
      btn.disabled = true;
      btn.textContent = 'Saving\u2026';

      for (const key of ['MailingName', 'FirstName', 'LastName', 'Street', 'Apartment',
                         'City', 'State', 'ZipCode', 'PhoneNumber', 'OtherPeople', 'HolidayCard']) {
        currentEntry[key] = document.getElementById(key).value;
      }

      try {
        const res = await fetch('/api/AddressBookUpdateEntry', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(currentEntry)
        });

        if (res.ok) {
          const params = new URLSearchParams(window.location.search);
          const id = params.get('id');
          const s = document.getElementById('status');
          s.className = 'status success';
          s.innerHTML = `Saved successfully. <a href="/claude/addressbook/index.html?id=${encodeURIComponent(id)}">Return to address book &rarr;</a>`;
        } else if (res.status === 412) {
          showStatus('Save failed: someone else updated this entry. Please reload.', true);
        } else {
          showStatus('Save failed.', true);
        }
      } catch (err) {
        console.error(err);
        showStatus('Error saving entry.', true);
      }

      btn.disabled = false;
      btn.textContent = 'Save Changes';
    }

    async function deleteEntry() {
      if (!currentEntry) {
        showStatus('No entry loaded.', true);
        return;
      }

      if (!confirm('Are you sure you want to delete this entry? This cannot be undone.')) return;

      const btn = document.getElementById('deleteBtn');
      btn.disabled = true;
      btn.textContent = 'Deleting\u2026';

      try {
        const res = await fetch('/api/AddressBookDeleteEntry', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(currentEntry)
        });

        if (res.ok) {
          showStatus('Entry deleted successfully. Redirecting\u2026', false);
          setTimeout(() => { window.location.href = '/claude/addressbook/index.html'; }, 800);
        } else if (res.status === 412) {
          showStatus('Delete failed: someone else updated this entry. Please reload.', true);
          btn.disabled = false;
          btn.textContent = 'Delete Entry';
        } else {
          showStatus('Delete failed.', true);
          btn.disabled = false;
          btn.textContent = 'Delete Entry';
        }
      } catch (err) {
        console.error(err);
        showStatus('Error deleting entry.', true);
        btn.disabled = false;
        btn.textContent = 'Delete Entry';
      }
    }

    document.getElementById('saveBtn').onclick = saveChanges;
    document.getElementById('deleteBtn').onclick = deleteEntry;

    (async function init() {
      const authed = await checkAuth();
      if (!authed) return;
      document.getElementById('editForm').style.display = 'block';
      await loadEntry();
    })();
  </script>

</body>
</html>
