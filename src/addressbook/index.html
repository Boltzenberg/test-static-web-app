<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Address Book</title>
  <link rel="stylesheet" href="/shared.css">
  <style>
    #filterInput {
      margin-bottom: 8px;
      display: none;
    }

    #addressDropdown {
      width: 100%;
      display: none;
    }

    #holidaySection {
      margin-top: 32px;
      padding-top: 16px;
      border-top: 1px solid #ddd;
      display: none;
    }
  </style>
</head>
<body>

  <div id="authContainer"></div>

  <h2>Address Book</h2>

  <div id="status" class="status"></div>

  <input type="search" id="filterInput" placeholder="Filter entries&hellip;">
  <br>
  <select id="addressDropdown">
    <option value="">Loading&hellip;</option>
  </select>

  <div id="addressDisplay"></div>
  <div id="linksDiv"></div>

  <section id="holidaySection">
    <h3 style="margin-top: 0;">Holiday Cards</h3>
    <div class="btn-group">
      <button onclick="displayHolidayCardPreview()">View Holiday Card List</button>
      <button onclick="exportHolidayCardCsv()">Export as Mail Merge CSV</button>
    </div>
    <div id="holidayCardDiv"></div>
  </section>

  <script>
    let addressEntries = [];

    async function checkAuth() {
      const authDiv = document.getElementById('authContainer');

      try {
        const res = await fetch('/.auth/me');
        const data = await res.json();
        const user = data?.clientPrincipal;

        if (!user) {
          authDiv.innerHTML = `
            <div class="auth-bar">
              <span>You must sign in to view your address book.</span>
              <button id="signInBtn">Sign in with Microsoft</button>
            </div>`;
          document.getElementById('signInBtn').onclick = () => {
            window.location.href = '/.auth/login/aad?post_login_redirect_uri=' + encodeURIComponent(window.location.pathname);
          };
          return false;
        }

        authDiv.innerHTML = `
          <div class="auth-bar">
            <span>Signed in as <strong>${user.userDetails}</strong></span>
            <button id="signOutBtn">Sign out</button>
          </div>`;
        document.getElementById('signOutBtn').onclick = () => {
          window.location.href = '/.auth/logout?post_logout_redirect_uri=' + encodeURIComponent(window.location.pathname);
        };

        return true;

      } catch (err) {
        authDiv.textContent = 'Error checking authentication.';
        console.error(err);
        return false;
      }
    }

    async function loadAddressBook() {
      const dropdown = document.getElementById('addressDropdown');
      const status = document.getElementById('status');

      try {
        status.textContent = 'Loading address book entries\u2026';
        status.className = 'status';

        const response = await fetch('/api/AddressBookReadAll');
        if (!response.ok) throw new Error(`API returned ${response.status}`);

        addressEntries = await response.json();
        addressEntries.sort((a, b) => {
          const cmp = (a.LastName || '').toLowerCase().localeCompare((b.LastName || '').toLowerCase());
          if (cmp !== 0) return cmp;
          return (a.FirstName || '').toLowerCase().localeCompare((b.FirstName || '').toLowerCase());
        });

        populateDropdown(addressEntries);

        status.textContent = '';
        status.className = 'status';

        if (addressEntries.length > 0) {
          const params = new URLSearchParams(window.location.search);
          const id = params.get('id');
          const selected = id ? addressEntries.find(x => x.id === id) : null;
          const entry = selected || addressEntries[0];
          dropdown.value = entry.id;
          showAddress(entry);
        }

        document.getElementById('filterInput').style.display = 'block';
        document.getElementById('holidaySection').style.display = 'block';

      } catch (err) {
        status.textContent = 'Failed to load address book entries.';
        status.className = 'status error';
        console.error(err);
        dropdown.innerHTML = '<option>Error loading entries</option>';
      }
    }

    function populateDropdown(entries) {
      const dropdown = document.getElementById('addressDropdown');
      dropdown.innerHTML = '';
      entries.forEach(entry => {
        const option = document.createElement('option');
        option.value = entry.id;
        option.textContent = (`${entry.LastName ?? ''}, ${entry.FirstName ?? ''}`).trim() || '(Unnamed Entry)';
        dropdown.appendChild(option);
      });
    }

    document.getElementById('filterInput').addEventListener('input', function() {
      const q = this.value.toLowerCase();
      const filtered = q
        ? addressEntries.filter(e =>
            (e.LastName || '').toLowerCase().includes(q) ||
            (e.FirstName || '').toLowerCase().includes(q) ||
            (e.MailingName || '').toLowerCase().includes(q))
        : addressEntries;
      populateDropdown(filtered);
      if (filtered.length > 0) showAddress(filtered[0]);
    });

    function googleMapsUrl(entry) {
      const address = `${entry.Street} ${entry.City}, ${entry.State} ${entry.ZipCode}`;
      return `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(address)}`;
    }

    function showAddress(entry) {
      const addressDisplayDiv = document.getElementById('addressDisplay');
      const linksDiv = document.getElementById('linksDiv');

      if (!entry) {
        addressDisplayDiv.innerHTML = '';
        linksDiv.innerHTML = '';
        return;
      }

      const name = entry.MailingName ||
        `${entry.FirstName ?? ''} ${entry.LastName ?? ''}`.trim() ||
        '(Unnamed)';

      const addrLines = [
        entry.Street,
        entry.Apartment,
        `${entry.City ?? ''}, ${entry.State ?? ''} ${entry.ZipCode ?? ''}`.trim()
      ].filter(x => x && x !== ',  ');

      const phoneHtml = entry.PhoneNumber
        ? `<div class="meta"><a href="tel:${entry.PhoneNumber}">${entry.PhoneNumber}</a></div>`
        : '';

      const holidayHtml = entry.HolidayCard
        ? `<div><span class="holiday-badge">&#10003; Holiday Card</span></div>`
        : '';

      addressDisplayDiv.innerHTML = `
        <div class="address-card">
          <div class="name">${name}</div>
          ${addrLines.map(l => `<div>${l}</div>`).join('')}
          ${phoneHtml}
          ${holidayHtml}
        </div>`;

      linksDiv.innerHTML = `
        <div class="btn-group">
          <a class="btn" href="/addressbook/edit.html?id=${encodeURIComponent(entry.id)}">Edit this entry</a>
          <a class="btn" href="/addressbook/add.html">Add new entry</a>
          <a class="btn" href="${googleMapsUrl(entry)}" target="_blank" rel="noopener">Map it!</a>
        </div>`;
    }

    function exportHolidayCardCsv() {
      const filtered = addressEntries.filter(e => e.HolidayCard);
      const rows = [['MailingName', 'Street', 'Apartment', 'City', 'State', 'ZipCode']];
      for (const e of filtered) {
        rows.push([e.MailingName || '', e.Street || '', e.Apartment || '', e.City || '', e.State || '', e.ZipCode || '']);
      }
      const csv = rows
        .map(r => r.map(v => (v.includes(',') || v.includes('"')) ? `"${v.replace(/"/g, '""')}"` : v).join(','))
        .join('\n');
      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'HolidayCardExport.csv';
      a.click();
      URL.revokeObjectURL(url);
    }

    function displayHolidayCardPreview() {
      const container = document.getElementById('holidayCardDiv');
      container.innerHTML = '';

      const filtered = addressEntries.filter(e => e.HolidayCard);

      const summary = document.createElement('p');
      summary.textContent = `${filtered.length} entr${filtered.length === 1 ? 'y' : 'ies'} marked for holiday cards.`;
      container.appendChild(summary);

      if (filtered.length === 0) return;

      const list = document.createElement('ul');
      for (const entry of filtered) {
        const li = document.createElement('li');
        const link = document.createElement('a');
        link.href = `/addressbook/edit.html?id=${entry.id}`;
        link.textContent = entry.MailingName ||
          `${entry.FirstName ?? ''} ${entry.LastName ?? ''}`.trim() ||
          '(Unnamed Entry)';
        li.appendChild(link);
        list.appendChild(li);
      }
      container.appendChild(list);
    }

    document.getElementById('addressDropdown').addEventListener('change', (e) => {
      const entry = addressEntries.find(x => x.id === e.target.value);
      showAddress(entry);
    });

    (async function init() {
      const isAuthed = await checkAuth();
      if (!isAuthed) return;

      document.getElementById('addressDropdown').style.display = 'block';
      await loadAddressBook();
    })();
  </script>

</body>
</html>
