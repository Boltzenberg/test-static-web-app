<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Address Book Entry</title>
  <link rel="stylesheet" href="/shared.css">
</head>
<body>

  <div id="authContainer"></div>

  <h2>Add New Address Book Entry</h2>

  <div id="status" class="status"></div>

  <form id="addForm" style="display:none;">

    <fieldset>
      <legend>Name</legend>
      <div class="form-grid">
        <label for="MailingName">Mailing Name</label>
        <input type="text" id="MailingName">

        <label for="FirstName">First Name</label>
        <input type="text" id="FirstName">

        <label for="LastName">Last Name</label>
        <input type="text" id="LastName">
      </div>
    </fieldset>

    <fieldset>
      <legend>Address</legend>
      <div class="form-grid">
        <label for="Street">Street</label>
        <input type="text" id="Street">

        <label for="Apartment">Apartment</label>
        <input type="text" id="Apartment">

        <label for="City">City</label>
        <input type="text" id="City">

        <label for="State">State</label>
        <input type="text" id="State">

        <label for="ZipCode">Zip Code</label>
        <input type="text" id="ZipCode">
      </div>
    </fieldset>

    <fieldset>
      <legend>Contact &amp; Notes</legend>
      <div class="form-grid">
        <label for="PhoneNumber">Phone Number</label>
        <input type="tel" id="PhoneNumber">

        <label for="OtherPeople">Other People</label>
        <input type="text" id="OtherPeople">

        <label for="HolidayCard">Holiday Card</label>
        <select id="HolidayCard">
          <option value="">&mdash; none &mdash;</option>
          <option value="Yes">Yes</option>
        </select>
      </div>
    </fieldset>

    <button type="button" id="addBtn">Add Entry</button>

  </form>

  <div id="linksDiv" style="margin-top: 16px;">
    <a href="/addressbook/index.html">&larr; Back to Address Book</a>
  </div>

  <script>
    async function checkAuth() {
      const authDiv = document.getElementById('authContainer');

      try {
        const res = await fetch('/.auth/me');
        const data = await res.json();
        const user = data?.clientPrincipal;

        if (!user) {
          authDiv.innerHTML = `
            <div class="auth-bar">
              <span>You must sign in to add address book entries.</span>
              <button id="signInBtn">Sign in with Microsoft</button>
            </div>`;
          document.getElementById('signInBtn').onclick = () => {
            window.location.href = '/.auth/login/aad?post_login_redirect_uri=' + encodeURIComponent(window.location.pathname);
          };
          return false;
        }

        authDiv.innerHTML = `
          <div class="auth-bar">
            <span>Signed in as <strong>${user.userDetails}</strong></span>
            <button id="signOutBtn">Sign out</button>
          </div>`;
        document.getElementById('signOutBtn').onclick = () => {
          window.location.href = '/.auth/logout?post_logout_redirect_uri=' + encodeURIComponent(window.location.pathname);
        };

        return true;

      } catch (err) {
        authDiv.textContent = 'Error checking authentication.';
        console.error(err);
        return false;
      }
    }

    async function addEntry() {
      const btn = document.getElementById('addBtn');
      const status = document.getElementById('status');

      btn.disabled = true;
      btn.textContent = 'Adding\u2026';
      status.textContent = '';
      status.className = 'status';

      const newEntry = {
        MailingName: document.getElementById('MailingName').value,
        FirstName:   document.getElementById('FirstName').value,
        LastName:    document.getElementById('LastName').value,
        Street:      document.getElementById('Street').value,
        Apartment:   document.getElementById('Apartment').value,
        City:        document.getElementById('City').value,
        State:       document.getElementById('State').value,
        ZipCode:     document.getElementById('ZipCode').value,
        PhoneNumber: document.getElementById('PhoneNumber').value,
        OtherPeople: document.getElementById('OtherPeople').value,
        HolidayCard: document.getElementById('HolidayCard').value
      };

      try {
        const res = await fetch('/api/AddressBookAddEntry', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(newEntry)
        });

        if (!res.ok) {
          status.textContent = 'Failed to add entry.';
          status.className = 'status error';
          btn.disabled = false;
          btn.textContent = 'Add Entry';
          return;
        }

        const created = await res.json();

        if (!created.id) {
          status.textContent = 'Entry added, but no ID returned.';
          status.className = 'status error';
          btn.disabled = false;
          btn.textContent = 'Add Entry';
          return;
        }

        status.textContent = 'Entry added successfully. Redirecting\u2026';
        status.className = 'status success';

        setTimeout(() => {
          window.location.href = `/addressbook/edit.html?id=${encodeURIComponent(created.id)}`;
        }, 600);

      } catch (err) {
        console.error(err);
        status.textContent = 'Error adding entry.';
        status.className = 'status error';
        btn.disabled = false;
        btn.textContent = 'Add Entry';
      }
    }

    document.getElementById('addBtn').onclick = addEntry;

    (async function init() {
      const authed = await checkAuth();
      if (!authed) return;
      document.getElementById('addForm').style.display = 'block';
    })();
  </script>

</body>
</html>
